<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小站 - Liquid Glass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ★ 关键：背景图片直接应用在 body 上，这是 Liquid Glass 生效的前提 ★ */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 背景渐变会被 Liquid Glass 折射，效果会更生动 */
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 20px;
        }

        /* 
            ★ 卡片样式调整 ★ 
            因为 <liquid-glass> 组件会创建一个包含阴影DOM的元素，
            原有的 .card 样式需要应用到组件内部的内容容器上。
            这里我们保留大部分样式，但通过组件属性来控制玻璃效果。
        */
        .card-content {
            /* 这是放在 <liquid-glass> 内部的实际内容 */
            width: 100%;
            padding: 56px 48px;
            color: #fff;
            /* 内容本身的样式，继承自原 .card */
        }

        .greeting {
            font-size: 56px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 36px;
            letter-spacing: -0.02em;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 17px;
            color: #f0f0f0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .label {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            min-width: 60px;
        }

        .value {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
            word-break: break-all;
            text-align: right;
            color: #ffffff;
        }

        .value a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            background: #007aff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-block;
        }

        .value a:hover {
            background: #005bbf;
            transform: scale(0.96);
        }

        .value a:active {
            transform: scale(0.92);
        }

        .copy-btn {
            background: #007aff;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: #005bbf;
            transform: scale(0.96);
        }

        .copy-btn:active {
            transform: scale(0.92);
        }

        /* 小屏适配：调整内容内边距 */
        @media (max-width: 560px) {
            .card-content {
                padding: 32px 20px;
            }
            .greeting {
                font-size: 40px;
            }
            .info-row {
                font-size: 15px;
                padding: 12px 14px;
            }
            .label {
                min-width: 50px;
            }
        }
    </style>
</head>
<body>

    <!-- 
        ★ 使用 <liquid-glass> 组件替代原来的 .card ★
        我根据你原卡片设计（宽520px，内边距等）和常见视口（以1920x1080为例）
        计算了响应式参数，这样卡片会保持比例并完美适配各种屏幕。
        如果你希望调整玻璃质感，可以修改 blur、specular-opacity 等属性。
    -->
    <liquid-glass
        responsive="true"
        vw-width="27.1"      <!-- 520px / 1920px ≈ 27.1% -->
        vh-height="30.6"     <!-- 以内容高度估算，你也可以微调 -->
        radius-percent="7.7" <!-- 40px / 520px ≈ 7.7% (border-radius) -->
        bezel-width-percent="3.8" <!-- 20px / 520px ≈ 3.8% -->
        blur="20"
        fallback-blur="25"
        specular-opacity="0.6"
        flex-center="true"
    >
        <!-- 原来的卡片内容，放在组件内部 -->
        <div class="card-content">
            <div class="greeting">你好！</div>

            <div class="info-list">
                <div class="info-row">
                    <span class="label">邮箱</span>
                    <span class="value">
                        <span>wsnb12345qwert@outlook.com</span>
                        <button class="copy-btn" onclick="copyEmail()">复制</button>
                    </span>
                </div>

                <div class="info-row">
                    <span class="label">B站</span>
                    <span class="value">
                        <a href="https://space.bilibili.com/3546836245678947" target="_blank">访问主页</a>
                    </span>
                </div>

                <div class="info-row">
                    <span class="label">GitHub</span>
                    <span class="value">
                        <a href="https://github.com/YeeishVigg" target="_blank">访问主页</a>
                    </span>
                </div>
            </div>
        </div>
    </liquid-glass>

    <!-- ★ 引入 Liquid Glass 核心组件 ★ -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/winaviation/liquid-web@main/lg-component.js"></script>

    <script>
        function copyEmail() {
            const email = "wsnb12345qwert@outlook.com";
            navigator.clipboard.writeText(email).then(() => {
                alert("邮箱已复制！");
            }).catch(() => {
                const input = document.createElement('input');
                input.value = email;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert("邮箱已复制！");
            });
        }
    </script>

</body>
</html>
