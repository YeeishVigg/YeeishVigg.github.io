<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: url('https://YeeishVigg.github.io/background.jpg') no-repeat center center fixed;
            background-size: cover;
            padding: 20px;
        }

        .card-content {
            padding: 40px 48px;
            text-align: left;
            width: 420px;
            color: #1c1c1e;
        }

        .greeting {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
        }

        .info-line {
            font-size: 18px;
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .info-line .label {
            font-weight: 500;
            color: #3a3a3c;
            min-width: 70px;
        }

        .info-line .value {
            color: #1c1c1e;
            word-break: break-all;
        }

        .info-line a {
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
        }

        .info-line a:hover {
            text-decoration: underline;
        }

        .copy-btn {
            background: #007aff;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 4px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .copy-btn:hover {
            background: #005bbf;
            transform: scale(0.96);
        }

        .copy-btn:active {
            transform: scale(0.92);
        }

        @media (max-width: 480px) {
            .card-content {
                padding: 28px 20px;
                width: 100%;
            }
            .greeting {
                font-size: 36px;
            }
            .info-line {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ★ 关键：这里必须是 <liquid-glass>，不是 <div> ★ -->
    <liquid-glass
        responsive="true"
        vw-width="88"
        vh-height="78"
        radius-percent="2.8"
        bezel-width-percent="2"
        blur="25"
        specular-opacity="0.8"
        tint="rgba(255, 255, 255, 0.03)"
        fallback-blur="25"
        flex-center="true"
    >
        <div class="card-content">
            <div class="greeting">你好！</div>

            <div class="info-line">
                <span class="label">邮箱</span>
                <span class="value">wsnb12345qwert@outlook.com</span>
                <button class="copy-btn" onclick="copyEmail()">复制</button>
            </div>

            <div class="info-line">
                <span class="label">bilibili</span>
                <span class="value">
                    <a href="https://space.bilibili.com/3546836245678947" target="_blank">访问主页</a>
                </span>
            </div>

            <div class="info-line">
                <span class="label">GitHub</span>
                <span class="value">
                    <a href="https://github.com/YeeishVigg" target="_blank">访问主页</a>
                </span>
            </div>
        </div>
    </liquid-glass>

    <!-- ★ 引用 CDN 加载组件 ★ -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/winaviation/liquid-web@main/lg-component.js"></script>

    <script>
        function copyEmail() {
            const email = "wsnb12345qwert@outlook.com";
            navigator.clipboard.writeText(email).then(() => {
                alert("邮箱已复制！");
            }).catch(() => {
                const input = document.createElement('input');
                input.value = email;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert("邮箱已复制！");
            });
        }
    </script>

</body>
</html>
