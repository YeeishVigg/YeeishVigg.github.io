<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 深蓝渐变背景 */
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 20px;
        }

        /* 正方形圆角卡片 */
        .card {
            width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .greeting {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 16px;
            color: #f0f0f0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .label {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            min-width: 60px;
        }

        .value {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
            word-break: break-all;
            text-align: right;
            color: #ffffff;
        }

        .value a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            background: #007aff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-block;
        }

        .value a:hover {
            background: #005bbf;
            transform: scale(0.96);
        }

        .value a:active {
            transform: scale(0.92);
        }

        .copy-btn {
            background: #007aff;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: #005bbf;
            transform: scale(0.96);
        }

        .copy-btn:active {
            transform: scale(0.92);
        }

        /* 小屏适配 */
        @media (max-width: 480px) {
            .card {
                width: 100%;
                padding: 32px 20px;
                border-radius: 24px;
            }
            .greeting {
                font-size: 36px;
            }
            .info-row {
                font-size: 14px;
                padding: 10px 12px;
            }
            .label {
                min-width: 50px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="greeting">你好！</div>

        <div class="info-list">
            <!-- 邮箱行 -->
            <div class="info-row">
                <span class="label">邮箱</span>
                <span class="value">
                    <span>wsnb12345qwert@outlook.com</span>
                    <button class="copy-btn" onclick="copyEmail()">复制</button>
                </span>
            </div>

            <!-- B站行 -->
            <div class="info-row">
                <span class="label">B站</span>
                <span class="value">
                    <a href="https://space.bilibili.com/3546836245678947" target="_blank">访问主页</a>
                </span>
            </div>

            <!-- GitHub行 -->
            <div class="info-row">
                <span class="label">GitHub</span>
                <span class="value">
                    <a href="https://github.com/YeeishVigg" target="_blank">访问主页</a>
                </span>
            </div>
        </div>
    </div>

    <script>
        function copyEmail() {
            const email = "wsnb12345qwert@outlook.com";
            navigator.clipboard.writeText(email).then(() => {
                alert("邮箱已复制！");
            }).catch(() => {
                const input = document.createElement('input');
                input.value = email;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert("邮箱已复制！");
            });
        }
    </script>

</body>
</html>
